name: package-bubbleui-js

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/bubbleui-js/**'
      - '.github/workflows/package-bubbleui-js.yml'
      - 'scripts/release_metadata.py'

jobs:
  package-web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/bubbleui-js

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package versions
        run: python "$GITHUB_WORKSPACE/scripts/release_metadata.py" --require-match

      - name: Pack bubbleui-js
        id: pack
        run: |
          PACKAGE_FILE=$(npm pack)
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubbleui-js-package
          path: packages/bubbleui-js/${{ steps.pack.outputs.package_file }}
          if-no-files-found: error
