name: release-bubbleui

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag such as v0.1.0'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate tag and package versions
        run: python scripts/release_metadata.py --tag "${RELEASE_TAG}" --require-match

      - name: Install Python build tooling and project dependencies
        run: python -m pip install build -e .

      - name: Run Python smoke test
        run: python tests/smoke_test.py

      - name: Build Python distributions
        run: python -m build

      - name: Pack bubbleui-js
        id: pack
        working-directory: packages/bubbleui-js
        run: |
          PACKAGE_FILE=$(npm pack)
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bubbleui-python-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error

      - name: Upload React tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubbleui-js-${{ env.RELEASE_TAG }}
          path: packages/bubbleui-js/${{ steps.pack.outputs.package_file }}
          if-no-files-found: error
