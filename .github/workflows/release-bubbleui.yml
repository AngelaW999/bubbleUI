name: release-bubbleui

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate tag and package versions
        run: python scripts/release_metadata.py --tag "${GITHUB_REF_NAME}" --require-match

      - name: Install Python build tooling and project dependencies
        run: python -m pip install build -e .

      - name: Run Python smoke test
        run: python tests/smoke_test.py

      - name: Build Python distributions
        run: python -m build

      - name: Pack bubbleui-js
        id: pack
        working-directory: packages/bubbleui-js
        run: |
          PACKAGE_FILE=$(npm pack)
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bubbleui-python-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload React tgz artifact
        uses: actions/upload-artifact@v4
        with:
          name: bubbleui-js-${{ github.ref_name }}
          path: packages/bubbleui-js/${{ steps.pack.outputs.package_file }}
          if-no-files-found: error
